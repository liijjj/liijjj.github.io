name: Automated Weather Data Fetcher

on:
  schedule:
    # 周期性定时器：每15分钟触发一次 (对应分钟为：0, 15, 30, 45)
    # 此时区为 UTC，对应的北京时间同样为整点、15分、30分、45分
    - cron: '*/15 * * * *'
  workflow_dispatch: # 允许你在 GitHub 页面上手动点击运行测试

permissions:
  contents: write # 赋予工作流向仓库提交代码和更新 JSON 的权限

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-node-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install requests

    - name: Execute Data Fetching Script
      env:
        QWEATHER_KEY: ${{ secrets.QWEATHER_KEY }}
        AQICN_TOKEN: ${{ secrets.AQICN_TOKEN }}
      run: |
        python monitor/weather/quzhou/fetch_data.py

    - name: Commit and Push Updates
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # 检查 output 目录内是否有文件变更
        git add monitor/weather/quzhou/output/
        if git diff --staged --quiet; then
          echo "数据未发生实质变化，跳过本次提交。"
        else
          git commit -m "🤖 自动跑批：同步最新气象及空气质量数据 [$(date -d '8 hours' +'%Y-%m-%d %H:%M:%S') CST]"
          git push origin main
        fi
