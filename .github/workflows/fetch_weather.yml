name: Automated Weather Data Fetcher

on:
  schedule:
    # 每15分钟触发一次
    - cron: '*/15 * * * *'
  workflow_dispatch: # 允许手动点击运行

permissions:
  contents: write 

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # ✅ 修正参数名

    - name: Install Dependencies
      run: |
        pip install requests

    - name: Execute Data Fetching Script
      env:
        QWEATHER_KEY: ${{ secrets.QWEATHER_KEY }}
        QWEATHER_DOMAIN: ${{ secrets.QWEATHER_DOMAIN }} # ⚠️ 确保你的 Secret 里有配置这个
        AQICN_TOKEN: ${{ secrets.AQICN_TOKEN }}
      run: |
        python monitor/weather/quzhou/fetch_data.py

    - name: Commit and Push Updates
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # ✅ 强行强制把整个 monitor 目录的变更都纳入 Git 检查，防止漏掉路径
        git add monitor/
        
        if git diff --staged --quiet; then
          echo "数据未发生实质变化，跳过本次提交。"
        else
          git commit -m "🤖 自动跑批：同步最新气象及空气质量数据 [$(date -d '8 hours' +'%Y-%m-%d %H:%M:%S') CST]"
          git push origin main
        fi
