name: 自动更新天气静态缓存 (15m/1h 混合周期)

on:
  schedule:
    - cron: '*/15 * * * *' # 每 15 分钟自动运行一次
  workflow_dispatch: # 允许在 GitHub 页面上手动点击运行
  push:
    branches:
      - main
    paths-ignore:
      - 'monitor/**/output/**' # 防死循环

jobs:
  deploy-weather:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 创建输出多级目录
      run: |
        # 创建专属的隔离输出文件夹，确保 curl 写入时路径存在
        mkdir -p monitor/weather/output

    - name: 运行天气采集并生成 data.json
      run: |
        # =========================================================================
        # 【极其重要】请把下方最后的 URL 替换为你真实的 API 请求地址（包含你的 Token/Key）
        # 现在的接口会将获取到的庞大静态数据，精准打包并直接写入我们规划好的新路径下。
        # =========================================================================
        curl -s "https://hftianqi.com/api/your_real_weather_url_here" -o monitor/weather/output/data.json

    - name: 提交并推送数据到 GitHub Pages
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "github-actions[bot]"
        
        # 只把 monitor 目录下的数据变化加进暂存区
        git add monitor/
        
        # 检查是否有新数据，有就提交，没有就跳过
        if git diff --cached --quiet; then
          echo "天气数据未发生改变，跳过本次 Commit 提交。"
        else
          git commit -m "自动更新天气静态缓存 (Monitor System)"
          git push
        fi
