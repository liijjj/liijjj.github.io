name: 自动更新天气静态缓存 (15m/1h 混合周期)

on:
  schedule:
    # 每 15 分钟运行一次（GitHub Actions 可能会有几分钟延迟，属正常现象）
    - cron: '*/15 * * * *'
  workflow_dispatch: # 允许在 GitHub 页面上手动点击 "Run workflow" 触发

permissions:
  contents: write # 赋予 Actions 机器人向仓库提交和推送代码的权限

jobs:
  update-weather-data:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出仓库代码
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. 设置 Python 环境
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # 自动缓存依赖，加速后续运行

    # 3. 安装依赖
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install requests; fi

    # 4. 运行天气与空气质量抓取脚本
    - name: Run Weather Fetch Script
      env:
        AQICN_TOKEN: ${{ secrets.AQICN_TOKEN }}
        QWEATHER_DOMAIN: ${{ secrets.QWEATHER_DOMAIN }}
        QWEATHER_KEY: ${{ secrets.QWEATHER_KEY }}
      run: |
        # 创建输出目录（防止脚本因找不到目录报错）
        mkdir -p monitor/weather/quzhou/output/
        
        # 运行 Python 脚本
        python fetch.py

    # 5. 自动将最新的数据提交并推送到 GitHub 仓库
    - name: Commit and Push Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # 仅暂存该衢州天气输出目录下的 JSON 变更，避免误触其他文件
        git add monitor/weather/quzhou/output/*.json
        
        # 检查是否有文件更新，防止没有数据变化时 commit 报错
        if git diff --staged --quiet; then
          echo "数据未发生变化，跳过本次提交。"
        else
          git commit -m "🤖 自动更新天气静态缓存 [Skip CI]"
          git push origin main
        fi
